<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>日星择时</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#080816;color:#ccc;min-height:100vh}
.header{text-align:center;padding:20px 16px 4px}
.header h1{font-size:22px;color:#e8d5a0;letter-spacing:3px}
.header .sub{font-size:11px;color:#665;margin-top:4px}

.form{padding:12px 16px;max-width:420px;margin:0 auto}
.frow{display:flex;gap:8px;margin-bottom:10px}
.frow>div{flex:1}
.frow label{display:block;font-size:11px;color:#887;margin-bottom:2px}
.frow input,.frow select{width:100%;padding:9px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#ccc;font-size:14px;font-family:inherit}
.frow input:focus,.frow select:focus{outline:none;border-color:rgba(232,213,160,0.4)}
.frow select option{background:#1a1a2e;color:#ccc}
.btn{width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,#c9a84e,#a08030);color:#0a0a16;font-size:15px;font-weight:600;letter-spacing:2px;cursor:pointer}

.chart-wrap{display:none;max-width:420px;margin:8px auto;position:relative}
.chart-wrap canvas{width:100%;display:block}
.chart-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.chart-label .starname{font-size:13px;color:#e8d5a0;font-weight:600}

.result{display:none;max-width:420px;margin:0 auto;padding:0 16px 20px}
.best{background:linear-gradient(135deg,rgba(232,213,160,0.12),rgba(232,213,160,0.02));border:1px solid rgba(232,213,160,0.2);border-radius:10px;padding:14px;text-align:center;margin-bottom:12px}
.best .rank{font-size:11px;color:#bba870;letter-spacing:2px}
.best .time{font-size:26px;color:#e8d5a0;font-weight:700;letter-spacing:2px}
.best .desc{font-size:12px;color:#bba870;margin-top:4px;line-height:1.6}

.starlist{background:rgba(255,255,255,0.025);border-radius:10px;padding:12px;margin-top:8px}
.starlist .srow{display:flex;align-items:center;padding:4px 0;font-size:12px}
.starlist .sdot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}
.starlist .sname{width:50px;color:#aaa}
.starlist .spos{color:#776;flex:1;text-align:right}

hint{display:block;font-size:10px;color:#554;text-align:center;margin-top:16px;line-height:1.6}
.footer{text-align:center;font-size:10px;color:#444;padding:16px}
</style>
</head>
<body>

<div class="header">
<h1>日星择时</h1>
<p class="sub">日月拱照 · 择时借力</p>
</div>

<div class="form" id="form">
<div class="frow">
<div><label>日期</label><input type="date" id="date"></div>
</div>
<div class="frow">
<div><label>事项</label><select id="event">
<option value="network">拓展人脉</option>
<option value="deal">签约合作</option>
<option value="career">面试述职</option>
<option value="launch">项目启动</option>
<option value="love">约会感情</option>
<option value="travel">出行远行</option>
<option value="study">学习创作</option>
</select></div>
</div>
<button class="btn" onclick="calc()">查看星象 · 择时</button>
</div>

<div class="chart-wrap" id="chartWrap"><canvas id="chart"></canvas></div>
<div class="result" id="result">
<div class="best" id="bestCard"></div>
<div class="starlist" id="starList"></div>
</div>

<div class="footer">日星择时 · 杨公造命法</div>

<script>
const palaces=["戌","酉","申","未","午","巳","辰","卯","寅","丑","子","亥"];
const branches=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const pnames={戌:"白羊",酉:"金牛",申:"双子",未:"巨蟹",午:"狮子",巳:"处女",辰:"天秤",卯:"天蝎",寅:"射手",丑:"摩羯",子:"水瓶",亥:"双鱼"};
const hoursData=[
  {name:"卯",range:"5-7",idx:3},{name:"辰",range:"7-9",idx:4},
  {name:"巳",range:"9-11",idx:5},{name:"午",range:"11-13",idx:6},
  {name:"未",range:"13-15",idx:7},{name:"申",range:"15-17",idx:8},
  {name:"酉",range:"17-19",idx:9},{name:"戌",range:"19-21",idx:10},
  {name:"亥",range:"21-23",idx:11}
];
const eventMap={
  network:{main:"迁移",bonus:"福德",label:"社交人脉",tip:"太阳拱照迁移宫 · 社交磁场最强"},
  deal:{main:"财帛",bonus:"官禄",label:"签约合作",tip:"太阳拱照财帛宫 · 价值感在线"},
  career:{main:"官禄",bonus:"迁移",label:"事业争取",tip:"太阳拱照官禄宫 · 权威感最强"},
  launch:{main:"官禄",bonus:"财帛",label:"启动新事",tip:"太阳拱照官禄宫 · 开局气势在线"},
  love:{main:"夫妻",bonus:"福德",label:"感情增进",tip:"太阳拱照夫妻宫 · 亲和力拉满"},
  travel:{main:"迁移",bonus:"官禄",label:"出行远行",tip:"太阳拱照迁移宫 · 一路顺畅"},
  study:{main:"福德",bonus:"迁移",label:"学习创作",tip:"太阳拱照福德宫 · 灵感专注度最高"}
};

// 太阳黄经
function getSolarPos(dateStr){
  const d=new Date(dateStr+"T12:00:00+08:00");
  const y=d.getFullYear();
  let vernal=new Date(y,2,20,18,0,0);
  let diff=(d-vernal)/86400000;
  if(diff<0){vernal=new Date(y-1,2,20,18,0,0);diff=(d-vernal)/86400000}
  const deg=(diff*0.9856)%360;
  return {palace:palaces[Math.floor(deg/30)],deg:deg%30,totalDeg:deg};
}

// 木星近似 (周期11.86年，简化)
function getJupiterPos(dateStr){
  const d=new Date(dateStr+"T12:00:00+08:00");
  const y=d.getFullYear();
  const doy=(d-new Date(y,0,1))/86400000;
  // 2020.0 木星约在丑宫(摩羯)270°
  const yrFrac=y+doy/365.25-2020;
  const deg=(270+yrFrac*30.34)%360;
  return {palace:palaces[Math.floor(deg/30)],deg:deg%30,totalDeg:deg};
}

function calcMing(solarPalace,hourBranch){
  const si=branches.indexOf(solarPalace),hi=branches.indexOf(hourBranch);
  let cur=si,placed=hi;
  for(let c=0;c<12;c++){
    if(placed===branches.indexOf("卯"))return branches[cur];
    placed=(placed+1)%12;cur=(cur+1)%12;
  }
  return branches[si];
}
function targetP(ming,off){
  return branches[(branches.indexOf(ming)+off)%12];
}
function dist(p1,p2){
  const d=Math.abs(branches.indexOf(p1)-branches.indexOf(p2));
  return Math.min(d,12-d);
}

// 画星盘
function drawChart(solar,jupiter){
  const canvas=document.getElementById("chart");
  const w=canvas.parentElement.clientWidth;
  const s=Math.min(w,400);
  canvas.width=s*2;canvas.height=s*2;
  const ctx=canvas.getContext("2d");
  const cx=s,cy=s;
  const outerR=s*0.85,innerR=s*0.55,midR=(outerR+innerR)/2;

  ctx.clearRect(0,0,s*2,s*2);

  // 12宫
  for(let i=0;i<12;i++){
    const a0=-Math.PI/2+i*Math.PI/6,a1=a0+Math.PI/6;
    ctx.beginPath();ctx.arc(cx,cy,outerR,a0,a1);
    ctx.arc(cx,cy,innerR,a1,a0,true);ctx.closePath();
    ctx.fillStyle="rgba(255,255,255,0.015)";
    ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.06)";
    ctx.lineWidth=1;ctx.stroke();

    const am=a0+Math.PI/12;
    const tx=cx+midR*Math.cos(am),ty=cy+midR*Math.sin(am);
    ctx.fillStyle="#665";ctx.font=`bold ${s*0.04}px "PingFang SC","Microsoft YaHei"`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(palaces[i],tx,ty-10);
    ctx.fillStyle="#443";ctx.font=`${s*0.028}px "PingFang SC","Microsoft YaHei"`;
    ctx.fillText(pnames[palaces[i]],tx,ty+10);
  }

  // 绘制星体
  function drawStar(deg,totalDeg,color,r,label,lcolor){
    // deg: 在当前宫的角度, totalDeg: 总黄经
    const a=-Math.PI/2+(totalDeg*Math.PI/180);
    const d=innerR*0.65;
    const sx=cx+Math.cos(a)*d,sy=cy+Math.sin(a)*d;

    // 光晕
    const glow=ctx.createRadialGradient(sx,sy,0,sx,sy,r*3);
    glow.addColorStop(0,color+"33");glow.addColorStop(1,"transparent");
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(sx,sy,r*3,0,Math.PI*2);ctx.fill();

    // 星体
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=lcolor||"#fff";ctx.font=`bold ${s*0.03}px "PingFang SC"`;
    ctx.textAlign="center";ctx.fillText(label,sx,sy-14);
  }

  drawStar(solar.deg,solar.totalDeg,"#fa0",s*0.04,"☉日","#fa0");
  drawStar(jupiter.deg,jupiter.totalDeg,"#6af",s*0.035,"♃木","#8cf");

  // 中心
  ctx.fillStyle="rgba(232,213,160,0.12)";
  ctx.beginPath();ctx.arc(cx,cy,s*0.08,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#554";ctx.font=`${s*0.026}px "PingFang SC"`;
  ctx.textAlign="center";ctx.fillText("日星",cx,cy+2);

  document.getElementById("chartWrap").style.display="block";
}

function calc(){
  const date=document.getElementById("date").value;
  const eventKey=document.getElementById("event").value;
  if(!date)return;

  const solar=getSolarPos(date);
  const jupiter=getJupiterPos(date);
  const evt=eventMap[eventKey];
  const mo={迁移:7,财帛:5,官禄:4,夫妻:2,福德:3};
  const mainOff=mo[evt.main],bonusOff=mo[evt.bonus];

  // 画星盘
  drawChart(solar,jupiter);

  // 计算各时辰
  let results=hoursData.map(h=>{
    const ming=calcMing(solar.palace,branches[h.idx]);
    const tp=targetP(ming,mainOff),bp=targetP(ming,bonusOff);
    const dMain=dist(solar.palace,tp),dBonus=dist(solar.palace,bp);
    let score=0,descs=[];
    if(dMain===0){score+=100;descs.push("日入"+evt.main+"宫");}
    else if(dMain===4){score+=70;descs.push("日拱"+evt.main+"宫120°");}
    else if(dMain===2){score+=35;descs.push("日合"+evt.main+"宫60°");}
    if(dBonus===0){score+=60;descs.push("日入"+evt.bonus+"宫");}
    else if(dBonus===4){score+=35;descs.push("日拱"+evt.bonus+"宫120°");}
    return {hour:h,ming,tp,bp,dMain,dBonus,score,descs};
  });
  results.sort((a,b)=>b.score-a.score);
  const best=results[0];

  document.getElementById("bestCard").innerHTML=`
    <div class="rank">⭐ 最佳时辰</div>
    <div class="time">${best.hour.name}时 ${best.hour.range}点</div>
    <div class="desc">${evt.tip}<br><span style="font-size:10px;color:#665">日${solar.palace}宫${solar.deg.toFixed(1)}°·木${jupiter.palace}宫${jupiter.deg.toFixed(1)}°·命${best.ming}·${evt.main}${best.tp}</span></div>
  `;

  document.getElementById("starList").innerHTML=`
    <div class="srow"><span class="sdot" style="background:#fa0"></span><span class="sname">太阳</span><span style="color:#e8d5a0;flex:1;text-align:right">${solar.palace}宫 ${pnames[solar.palace]} ${solar.deg.toFixed(1)}°</span></div>
    <div class="srow"><span class="sdot" style="background:#6af"></span><span class="sname">木星</span><span style="color:#8bf;flex:1;text-align:right">${jupiter.palace}宫 ${pnames[jupiter.palace]} ${jupiter.deg.toFixed(1)}°</span></div>
    <div class="srow"><span class="sdot" style="background:transparent;border:1px solid #554"></span><span class="sname">各时辰</span><span style="color:#776;flex:1;text-align:right">${results.map((r,i)=>`<span style="color:${i===0?'#e8d5a0':i<3?'#887':'#665'}">${r.hour.name}${r.hour.range} ${r.descs[0]||''}</span><br>`).join('').slice(0,-4)}</span></div>
  `;

  document.getElementById("result").style.display="block";
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("date").value=new Date().toISOString().slice(0,10);
});
</script>
</body>
</html>
